# MODBUS_CONFIG_START
[[inputs.modbus]]
  name = "SCHNIEDER_M"
  slave_id = 1
  timeout = "1s"
  controller = "tcp://192.168.0.11:502"
  configuration_type = "register"
  optimization = "none"

  discrete_inputs = [
    { name = "PUMP_2_RUN", address = [111] },
    { name = "ENGINE_RUN", address = [112] },
    { name = "SCR_ASSIGNMENT", address = [114] },
    { name = "ANNULAR_OPEN", address = [101] },
