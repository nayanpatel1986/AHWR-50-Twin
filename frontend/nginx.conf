server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Re-resolve the backend hostname via Docker's embedded DNS at request time.
    # Using a variable in proxy_pass forces nginx to honour this resolver instead of
    # caching the upstream IP at startup, so a backend container recreate self-heals
    # (no more 502s until a manual nginx restart).
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Single-page app: hand client-side routes back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API -> backend service (internal network only).
    location /api/ {
        set $backend http://backend:5000;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.io live telemetry (WebSocket upgrade).
    location /socket.io/ {
        set $backend http://backend:5000;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
}
