[global_tags]
  user = "telegraf"

[agent]
  interval = "1s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "1s"
  flush_jitter = "0s"
  precision = ""
  hostname = ""
  omit_hostname = false

# Output: InfluxDB v2 (token/org/bucket injected from the environment).
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "$INFLUX_TOKEN"
  organization = "$INFLUX_ORG"
  bucket = "$INFLUX_BUCKET"

# Lightweight heartbeat input so Telegraf always has a valid input and stays
# up even before any PLC is configured. (Measurements 'internal_*' are ignored
# by the backend.) Run Telegraf with --watch-config=poll so edits below reload.
[[inputs.internal]]
  collect_memstats = false

# =============================================================================
# DEVICE / PLC inputs below are MANAGED BY THE BACKEND (admin -> PLC config UI).
# Telegraf is started with --watch-config and hot-reloads when this is rewritten.
# Do not hand-edit between the markers.
# =============================================================================
# PLC_CONFIG_START

# PLC_CONFIG_END
